<!DOCTYPE html>

<html lang="zh-Hant">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>台灣 Google 每日趨勢</title>

  <style>

    body {

      margin: 0;

      padding: 14px;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      background: #fff5f8;

      color: #333;

    }

    .card {

      max-width: 430px;

      margin: auto;

      background: #ffffff;

      border-radius: 24px;

      padding: 20px;

      box-shadow: 0 10px 30px rgba(255, 105, 150, 0.18);

      border: 1px solid #ffd6e5;

    }

    .title {

      font-size: 22px;

      font-weight: 800;

      color: #ff4f8b;

      margin-bottom: 6px;

    }

    .subtitle {

      font-size: 13px;

      color: #999;

      margin-bottom: 16px;

    }

    .trend {

      display: flex;

      align-items: center;

      gap: 12px;

      padding: 12px 0;

      border-bottom: 1px solid #ffe1ec;

    }

    .trend:last-child {

      border-bottom: none;

    }

    .rank {

      width: 34px;

      height: 34px;

      border-radius: 50%;

      background: linear-gradient(135deg, #ff77a9, #ffb6d1);

      color: white;

      font-weight: 800;

      display: flex;

      align-items: center;

      justify-content: center;

      flex-shrink: 0;

    }

    .info {

      flex: 1;

      min-width: 0;

    }

    .keyword {

      font-size: 16px;

      font-weight: 700;

      color: #333;

      white-space: nowrap;

      overflow: hidden;

      text-overflow: ellipsis;

    }

    .traffic {

      font-size: 12px;

      color: #ff6f9f;

      margin-top: 4px;

    }

    .footer {

      margin-top: 16px;

      font-size: 12px;

      color: #aaa;

      text-align: center;

      line-height: 1.6;

    }

    .loading {

      text-align: center;

      padding: 28px 0;

      color: #ff6f9f;

      font-weight: 600;

    }

    a {

      color: #ff4f8b;

      text-decoration: none;

      font-weight: 700;

    }

  </style>

</head>

<body>

  <div class="card">

    <div class="title">🇹🇼 台灣 Google 熱搜 Top 10</div>

    <div class="subtitle">每 30 分鐘自動更新一次｜適合 Notion 手機版</div>

    <div id="trendList" class="loading">載入中...</div>

    <div class="footer" id="updateTime"></div>

  </div>

  <script>

    const rssUrl =

      "https://trends.google.com/trends/trendingsearches/daily/rss?geo=TW";

    const apiList = [

      "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl),

      "https://api.allorigins.win/raw?url=" + encodeURIComponent(rssUrl)

    ];

    const backupData = [

      { title: "Google Trends 台灣熱搜", traffic: "即時資料更新中" },

      { title: "請點下方官方連結查看", traffic: "Google 官方資料" },

      { title: "台灣熱門搜尋", traffic: "更新中" },

      { title: "即時熱門話題", traffic: "更新中" },

      { title: "新聞熱門關鍵字", traffic: "更新中" },

      { title: "娛樂熱門搜尋", traffic: "更新中" },

      { title: "運動熱門搜尋", traffic: "更新中" },

      { title: "社群討論趨勢", traffic: "更新中" },

      { title: "今日關注議題", traffic: "更新中" },

      { title: "更多請查看 Google Trends", traffic: "官方頁面" }

    ];

    function renderTrends(items, isBackup = false) {

      const list = document.getElementById("trendList");

      const updateTime = document.getElementById("updateTime");

      list.className = "";

      list.innerHTML = "";

      items.slice(0, 10).forEach((item, index) => {

        const title = item.title || "未命名關鍵字";

        const traffic =

          item["ht:approx_traffic"] ||

          item.approx_traffic ||

          item.traffic ||

          "搜尋量資料更新中";

        const div = document.createElement("div");

        div.className = "trend";

        div.innerHTML = `

          <div class="rank">${index + 1}</div>

          <div class="info">

            <div class="keyword">${title}</div>

            <div class="traffic">搜尋量：約 ${traffic}</div>

          </div>

        `;

        list.appendChild(div);

      });

      const now = new Date();

      updateTime.innerHTML =

        "最後更新：" +

        now.toLocaleString("zh-TW", { hour12: false }) +

        "<br>" +

        (isBackup

          ? '目前使用備用顯示｜<a target="_blank" href="https://trends.google.com.tw/trending?geo=TW&hl=zh-TW">查看 Google 官方熱搜</a>'

          : '資料來源：Google Trends');

    }

    async function loadTrends() {

      for (const apiUrl of apiList) {

        try {

          const response = await fetch(apiUrl);

          const text = await response.text();

          let items = [];

          if (apiUrl.includes("rss2json")) {

            const data = JSON.parse(text);

            if (data.items && data.items.length > 0) {

              items = data.items;

            }

          } else {

            const parser = new DOMParser();

            const xml = parser.parseFromString(text, "text/xml");

            const xmlItems = [...xml.querySelectorAll("item")];

            items = xmlItems.map(item => ({

              title: item.querySelector("title")?.textContent || "",

              traffic:

                item.querySelector("approx_traffic")?.textContent ||

                item.querySelector("ht\\:approx_traffic")?.textContent ||

                "搜尋量資料更新中"

            }));

          }

          if (items.length > 0) {

            renderTrends(items, false);

            return;

          }

        } catch (error) {

          console.log("來源讀取失敗，嘗試下一個來源");

        }

      }

      renderTrends(backupData, true);

    }

    loadTrends();

    setInterval(loadTrends, 30 * 60 * 1000);

  </script>

</body>

</html>
